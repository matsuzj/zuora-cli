version: 2
project_name: zr
before:
  hooks:
    - go mod tidy
builds:
  - main: ./cmd/zr
    binary: zr
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/matsuzj/zuora-cli/internal/build.Version={{.Version}}
      - -X github.com/matsuzj/zuora-cli/internal/build.Commit={{.Commit}}
      - -X github.com/matsuzj/zuora-cli/internal/build.Date={{.Date}}
archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
checksum:
  name_template: checksums.txt
brews:
  - repository:
      owner: matsuzj
      name: homebrew-tap
    homepage: https://github.com/matsuzj/zuora-cli
    description: "Zuora CLI - Work with Zuora from the command line"
    install: |
      bin.install "zr"
    test: |
      system "#{bin}/zr", "version"
