version: '3'

vars:
  BINARY_NAME: zr
  VERSION:
    sh: git describe --tags --always --dirty 2>/dev/null || echo "dev"
  COMMIT:
    sh: git rev-parse --short HEAD 2>/dev/null || echo "unknown"
  DATE:
    sh: date -u '+%Y-%m-%dT%H:%M:%SZ'
  LDFLAGS: >-
    -s -w
    -X github.com/matsuzj/zuora-cli/internal/build.Version={{.VERSION}}
    -X github.com/matsuzj/zuora-cli/internal/build.Commit={{.COMMIT}}
    -X github.com/matsuzj/zuora-cli/internal/build.Date={{.DATE}}

tasks:
  build:
    desc: Build the zr binary
    cmds:
      - mkdir -p bin
      - go build -ldflags "{{.LDFLAGS}}" -o bin/{{.BINARY_NAME}} ./cmd/zr/
    sources:
      - ./**/*.go
    generates:
      - bin/{{.BINARY_NAME}}

  test:
    desc: Run all tests with race + coverage profile (matches CI)
    cmds:
      - go test -race -count=1 -coverprofile=cov.out -covermode=atomic ./...

  e2e:
    desc: Run E2E suites against the authenticated tenant (requires `zr auth login`)
    deps: [build]
    cmds:
      - ./tests/run-all.sh {{.CLI_ARGS}}

  lint:
    desc: Run linters
    cmds:
      - go vet ./...
      - staticcheck ./...

  vuln:
    desc: Scan for known vulnerabilities in deps and the toolchain (matches CI)
    cmds:
      - go run golang.org/x/vuln/cmd/govulncheck@latest ./...

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf bin/

  fmt:
    desc: Format Go source files
    cmds:
      - gofmt -w .

  fmtcheck:
    desc: Fail if any Go file is not gofmt-formatted (matches the CI Gofmt step)
    cmds:
      - |
        unformatted="$(gofmt -l .)"
        if [ -n "$unformatted" ]; then
          echo "These files are not gofmt-formatted (run 'task fmt'):"
          echo "$unformatted"
          exit 1
        fi

  modverify:
    desc: Verify module dependencies (matches the CI "Verify dependencies" step)
    cmds:
      - go mod verify

  cover:
    desc: Run tests and enforce the 73% coverage floor (matches CI)
    cmds:
      - task: test
      - |
        total="$(go tool cover -func=cov.out | awk '/^total:/ {sub(/%/, "", $3); print $3}')"
        echo "Total coverage: ${total}%"
        if awk "BEGIN{exit !(${total} < 73.0)}"; then
          echo "FAIL: coverage ${total}% is below the 73.0% threshold"
          exit 1
        fi

  check:
    desc: Quick pre-commit gate (gofmt check + lint + coverage) — a subset of `ci`
    cmds:
      - task: fmtcheck
      - task: lint
      - task: cover

  ci:
    desc: Full local mirror of the CI gate (gofmt, mod verify, vet, staticcheck, govulncheck, race+coverage, build)
    cmds:
      - task: modverify
      - task: fmtcheck
      - task: lint
      - task: vuln
      - task: cover
      # Build inline (not `task: build`) so it ALWAYS runs — the `build` task's
      # sources/generates fingerprint would skip it on a cached re-run, but CI
      # (and `make ci`) always build, so `ci` must too.
      - mkdir -p bin
      - go build -ldflags "{{.LDFLAGS}}" -o bin/{{.BINARY_NAME}} ./cmd/zr/
