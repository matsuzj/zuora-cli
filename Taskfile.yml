version: '3'

# Thin delegation layer for go-task users: every task forwards to the Makefile
# target of the same name, so build/gate logic lives in exactly one place (the
# Makefile — .github/workflows/ci.yml delegates to the same targets).

tasks:
  build:
    desc: Build the zr binary (delegates to make build)
    cmds:
      - make build
    # go-task-only convenience the Makefile doesn't provide: skip the build on
    # a cached re-run when no .go file changed.
    sources:
      - ./**/*.go
    generates:
      - bin/zr

  test:
    desc: Run all tests with race + coverage profile (matches CI)
    cmds:
      - make test

  e2e:
    desc: Run E2E suites against the authenticated tenant (requires `zr auth login`)
    cmds:
      - make e2e ARGS="{{.CLI_ARGS}}"

  lint:
    desc: Run linters (go vet + staticcheck pinned via go.mod's tool directive)
    cmds:
      - make lint

  vuln:
    desc: Scan for known vulnerabilities in deps and the toolchain (matches CI)
    cmds:
      - make vuln

  clean:
    desc: Remove build artifacts
    cmds:
      - make clean

  fmt:
    desc: Format Go source files
    cmds:
      - make fmt

  fmtcheck:
    desc: Fail if any Go file is not gofmt-formatted (matches the CI Gofmt step)
    cmds:
      - make fmtcheck

  modverify:
    desc: Verify module dependencies (matches the CI "Verify dependencies" step)
    cmds:
      - make modverify

  cover:
    desc: Run tests and enforce the 73% coverage floor (matches CI)
    cmds:
      - make cover

  check:
    desc: Quick pre-commit gate (gofmt check + lint + coverage) — a subset of `ci`
    cmds:
      - make check

  ci:
    desc: Full local mirror of the CI gate (.github/workflows/ci.yml)
    cmds:
      - make ci
