version: '3'

vars:
  BINARY_NAME: zr
  VERSION:
    sh: git describe --tags --always --dirty 2>/dev/null || echo "dev"
  COMMIT:
    sh: git rev-parse --short HEAD 2>/dev/null || echo "unknown"
  DATE:
    sh: date -u '+%Y-%m-%dT%H:%M:%SZ'
  LDFLAGS: >-
    -s -w
    -X github.com/matsuzj/zuora-cli/internal/build.Version={{.VERSION}}
    -X github.com/matsuzj/zuora-cli/internal/build.Commit={{.COMMIT}}
    -X github.com/matsuzj/zuora-cli/internal/build.Date={{.DATE}}

tasks:
  build:
    desc: Build the zr binary
    cmds:
      - mkdir -p bin
      - go build -ldflags "{{.LDFLAGS}}" -o bin/{{.BINARY_NAME}} ./cmd/zr/
    sources:
      - ./**/*.go
    generates:
      - bin/{{.BINARY_NAME}}

  test:
    desc: Run all tests
    cmds:
      - go test -race -count=1 ./...

  lint:
    desc: Run linters
    cmds:
      - go vet ./...
      - staticcheck ./...

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf bin/

  fmt:
    desc: Format Go source files
    cmds:
      - gofmt -w .

  check:
    desc: Run fmt check, lint, and tests
    cmds:
      - task: lint
      - task: test
