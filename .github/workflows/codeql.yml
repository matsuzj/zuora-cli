name: CodeQL

# Weekly, NON-BLOCKING security scan. Deliberately NOT wired into the PR/CI gate
# (no push/pull_request trigger) and NOT in `make ci`: staticcheck + govulncheck
# stay the per-PR gates, and this adds CodeQL's taint-analysis query packs as a
# low-noise background signal that also picks up new query-pack rules over time.
# Findings surface in the repo's Security tab. workflow_dispatch allows an
# on-demand run (e.g. to validate the workflow without waiting for the schedule).
on:
  schedule:
    - cron: '0 6 * * 1' # Mondays 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod

      - uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          languages: go

      - uses: github/codeql-action/autobuild@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3

      - uses: github/codeql-action/analyze@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
