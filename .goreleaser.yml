version: 2
project_name: zr
before:
  hooks:
    - go mod tidy
    - mkdir -p completions
    - sh -c "go run ./cmd/zr completion bash > completions/zr.bash"
    - sh -c "go run ./cmd/zr completion zsh > completions/zr.zsh"
    - sh -c "go run ./cmd/zr completion fish > completions/zr.fish"
builds:
  - main: ./cmd/zr
    binary: zr
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/matsuzj/zuora-cli/internal/build.Version={{.Version}}
      - -X github.com/matsuzj/zuora-cli/internal/build.Commit={{.Commit}}
      - -X github.com/matsuzj/zuora-cli/internal/build.Date={{.Date}}
archives:
  - formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md
      - completions/*
checksum:
  name_template: checksums.txt
brews:
  - repository:
      owner: matsuzj
      name: homebrew-tap
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/matsuzj/zuora-cli
    description: "Zuora CLI - Work with Zuora from the command line"
    license: "MIT"
    install: |
      bin.install "zr"
      bash_completion.install "completions/zr.bash" => "zr"
      zsh_completion.install "completions/zr.zsh" => "_zr"
      fish_completion.install "completions/zr.fish"
    test: |
      system "#{bin}/zr", "version"
