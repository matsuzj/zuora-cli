name: Release

on:
  push:
    tags:
      - 'v*'

# Never cancel an in-progress release — it may be mid-publish. Each tag is a
# distinct ref, so this only serializes an accidental re-push of the SAME tag.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod

      - uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7
        with:
          # Pin to the v2 line (goreleaser-action's own recommendation over
          # "latest"): it keeps the deprecated-but-valid `brews:` Homebrew
          # formula working — which, unlike a macOS-only cask, installs on both
          # macOS and Linux — and avoids a future major version silently
          # removing `brews:` and breaking a release.
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
