name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod

      # Each step delegates to the Makefile target of the same gate, so the
      # gate logic lives in exactly one place (the Makefile) and `make ci`
      # locally is the same gate by construction. Steps stay split to keep
      # per-gate CI annotations. staticcheck needs no install step: it runs
      # via go.mod's `tool` directive (pinned version, shared with local).
      - name: Verify dependencies
        run: make modverify

      - name: Gofmt
        run: make fmtcheck

      - name: Lint (vet + staticcheck + deadcode)
        run: make lint

      - name: Govulncheck
        run: make vuln

      - name: Test & coverage gate
        run: make cover

      - name: Build
        run: make build

  # Compile and race-test the darwin binary that Homebrew ships — the ubuntu
  # `test` job never builds it. Kept lighter than `test`: the gofmt/vet/
  # staticcheck/govulncheck/coverage steps are OS-independent, so duplicating
  # them on a ~10x-cost macOS runner would add no signal.
  macos:
    name: Test (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod

      # Intentionally NOT `make test`: kept lighter (no coverage profile) with
      # an explicit timeout, per the job comment above.
      - name: Test
        run: go test -race -count=1 -timeout=120s ./...

      - name: Build
        run: make build
