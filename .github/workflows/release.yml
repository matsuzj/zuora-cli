name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: goreleaser/goreleaser-action@v7
        with:
          # Pin to the v2 line (goreleaser-action's own recommendation over
          # "latest"): it keeps the deprecated-but-valid `brews:` Homebrew
          # formula working — which, unlike a macOS-only cask, installs on both
          # macOS and Linux — and avoids a future major version silently
          # removing `brews:` and breaking a release.
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
