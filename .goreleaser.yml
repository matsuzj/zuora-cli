version: 2
project_name: zr
before:
  hooks:
    - go mod tidy
    - mkdir -p completions
    - sh -c "go run ./cmd/zr completion bash > completions/zr.bash"
    - sh -c "go run ./cmd/zr completion zsh > completions/zr.zsh"
    - sh -c "go run ./cmd/zr completion fish > completions/zr.fish"
builds:
  - main: ./cmd/zr
    binary: zr
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/matsuzj/zuora-cli/internal/build.Version={{.Version}}
      - -X github.com/matsuzj/zuora-cli/internal/build.Commit={{.Commit}}
      - -X github.com/matsuzj/zuora-cli/internal/build.Date={{.Date}}
archives:
  - formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md
      - completions/*
checksum:
  name_template: checksums.txt
changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"
  groups:
    - title: Features
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: "Bug fixes"
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: Others
      order: 999
homebrew_casks:
  - repository:
      owner: matsuzj
      name: homebrew-tap
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/matsuzj/zuora-cli
    description: "Zuora CLI - Work with Zuora from the command line"
    binaries:
      - zr
    completions:
      bash: "completions/zr.bash"
      zsh: "completions/zr.zsh"
      fish: "completions/zr.fish"
    # Strip the macOS quarantine flag GateKeeper sets on downloaded binaries,
    # so `zr` runs without the "unidentified developer" block on first use.
    hooks:
      post:
        install: |
          if system_command("/usr/bin/xattr", args: ["-h"]).exit_status == 0
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/zr"]
          end
