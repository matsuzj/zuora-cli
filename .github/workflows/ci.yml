name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Verify dependencies
        run: go mod verify

      - name: Gofmt
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-formatted:"
            echo "$unformatted"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Install staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Staticcheck
        run: staticcheck ./...

      - name: Govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          "$(go env GOPATH)/bin/govulncheck" ./...

      - name: Test
        run: go test -race -count=1 -coverprofile=cov.out -covermode=atomic ./...

      - name: Coverage gate
        run: |
          total="$(go tool cover -func=cov.out | awk '/^total:/ {sub(/%/, "", $3); print $3}')"
          echo "Total coverage: ${total}%"
          if awk "BEGIN{exit !(${total} < 73.0)}"; then
            echo "FAIL: coverage ${total}% is below the 73.0% threshold"
            exit 1
          fi

      - name: Build
        run: mkdir -p bin && go build -o bin/zr ./cmd/zr/

  # Compile and race-test the darwin binary that Homebrew ships — the ubuntu
  # `test` job never builds it. Kept lighter than `test`: the gofmt/vet/
  # staticcheck/govulncheck/coverage steps are OS-independent, so duplicating
  # them on a ~10x-cost macOS runner would add no signal.
  macos:
    name: Test (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Test
        run: go test -race -count=1 -timeout=120s ./...

      - name: Build
        run: mkdir -p bin && go build -o bin/zr ./cmd/zr/
