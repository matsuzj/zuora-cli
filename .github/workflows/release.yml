name: Release

on:
  push:
    tags:
      - 'v*'

# Never cancel an in-progress release — it may be mid-publish. Each tag is a
# distinct ref, so this only serializes an accidental re-push of the SAME tag.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write      # OIDC token Sigstore uses for build-provenance attestation
  attestations: write  # write the provenance attestation to the repo

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod

      - uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7
        with:
          # Pin to the v2 line (goreleaser-action's own recommendation over
          # "latest"): it keeps the deprecated-but-valid `brews:` Homebrew
          # formula working — which, unlike a macOS-only cask, installs on both
          # macOS and Linux — and avoids a future major version silently
          # removing `brews:` and breaking a release.
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}

      # Signed SLSA build-provenance attestation for the release artifacts.
      # Attest the archives themselves so `gh attestation verify <name>.tar.gz`
      # resolves provenance for the binary a user actually downloads (attesting
      # only checksums.txt would force a manual checksum-chain step); also
      # attest checksums.txt. Runs AFTER goreleaser has populated dist/. If this
      # step ever fails it does NOT unpublish the release — goreleaser has
      # already run — it only leaves the job red, so it is safe to add.
      - uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            dist/*.tar.gz
            dist/checksums.txt
